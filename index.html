<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réservation Restaurant</title>
</head>
<body>

<h1>Réserver une table</h1>

<form>
  <label>Nom</label><br>
  <input type="text" name="name" required><br><br>

  <label>Email</label><br>
  <input type="email" name="email" required><br><br>

  <label>Date</label><br>
  <input type="date" name="date" required><br><br>

  <label>Heure</label><br>
  <input type="time" name="time" required><br><br>

  <label>Nombre de personnes</label><br>
  <input type="number" name="guests" min="1" value="2" required><br><br>

  <button type="submit">Enregistrer</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const { createClient } = supabase;

  const supabaseUrl = "https://yygmxdpasakzubmicfpyt.supabase.co";
  const supabaseKey = "sb_publishable_zU_EqPHk-epBhceNfV5aQg_V9bsyTey"; // ← colle ta vraie clé ici

  const client = createClient(supabaseUrl, supabaseKey);

  const form = document.querySelector("form");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = form.querySelector('input[name="name"]').value;
    const email = form.querySelector('input[name="email"]').value;
    const date = form.querySelector('input[name="date"]').value;
    const time = form.querySelector('input[name="time"]').value;
    const guests = form.querySelector('input[name="guests"]').value;

    const { error } = await client
      .from("reservations")
      .insert([{ name, email, date, time, guests }]);

    if (error) {
      alert("Erreur : " + error.message);
    } else {
      alert("Réservation enregistrée !");
      form.reset();
    }
  });

});
</script>

</body>
</html>
